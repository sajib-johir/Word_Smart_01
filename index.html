<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Smart 1 — Picture Flashcards</title>
  <link rel="stylesheet" href="style.css" />
  <style id="inline-critical-ui">

:root {
  --bg: #f7f4ee;
  --panel: rgba(255, 253, 248, 0.94);
  --card: #ffffff;
  --ink: #263238;
  --muted: #6b7280;
  --line: #e5e1d8;
  --green: #5f8d7e;
  --green-soft: #dcebe5;
  --green-dark: #466e61;
  --blue: #6b8eae;
  --blue-soft: #dfeaf3;
  --gold-soft: #f7ecc8;
  --red-soft: #f5dddd;
  --shadow: 0 18px 40px rgba(38, 50, 56, .10);
  --shadow-soft: 0 8px 20px rgba(38, 50, 56, .07);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(95, 141, 126, .12), transparent 24rem),
    radial-gradient(circle at top right, rgba(107, 142, 174, .12), transparent 22rem),
    linear-gradient(180deg, #fbf8f2 0%, var(--bg) 60%, #f4efe7 100%);
}
button, input { font: inherit; }
button { cursor: pointer; }
button:disabled { opacity: .45; cursor: not-allowed; }
a { color: inherit; }
h1,h2,h3,p { margin-top: 0; }
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

.page-shell { width: min(1120px, calc(100% - 20px)); margin: 0 auto; padding: 16px 0 32px; }
.panel, .menu-drawer, .reader-shell { background: var(--panel); border: 1px solid rgba(229,225,216,.98); box-shadow: var(--shadow); border-radius: var(--radius-xl); }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 12px;
}
.topbar h1 {
  margin: 0;
  font-size: clamp(1.9rem, 5vw, 3rem);
  line-height: 1;
  letter-spacing: -.03em;
  color: #243544;
  font-weight: 900;
}
.menu-btn, .drawer-close {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: linear-gradient(135deg, #ffffff, #eef3f7);
  color: var(--ink);
  box-shadow: var(--shadow-soft);
  font-size: 1.4rem;
}
.search-panel { padding: 14px; margin-bottom: 14px; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  min-height: 54px;
  border-radius: 18px;
  border: 1px solid #d7dee6;
  background: rgba(255,255,255,.98);
  color: var(--ink);
  padding: 0 54px 0 16px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.88);
}
.search-clear {
  position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
  width: 34px; height: 34px; min-height: 34px; padding: 0; border-radius: 999px;
  border: 1px solid #dde3ea; background: linear-gradient(135deg, #ffffff, #eef2f6);
  color: #6d7e90; font-size: 1.25rem; line-height: 1; display: grid; place-items: center;
}
.result-note { color: var(--muted); margin: 4px 2px 12px; font-size: .95rem; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
.word-card {
  background: rgba(255,255,255,.92);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 16px;
  box-shadow: var(--shadow-soft);
  display: flex; flex-direction: column; gap: 12px;
}
.word-card .number { color: var(--green-dark); font-weight: 900; font-size: 1.08rem; }
.word-card h3 {
  margin: 0; font-size: 1.85rem; line-height: 1.05; letter-spacing: -.02em;
  color: #243544; font-weight: 900;
}
.label-line { color: var(--muted); font-size: .94rem; }
.meaning-card {
  background: linear-gradient(135deg, #fcfaf5, #f7f2e7);
  border: 1px solid var(--line); border-radius: 18px; padding: 12px 14px;
  display: grid; gap: 8px;
}
.meaning-row { display: grid; gap: 4px; }
.meaning-label { font-size: .82rem; font-weight: 800; color: var(--green-dark); text-transform: uppercase; letter-spacing: .06em; }
.meaning-text { line-height: 1.5; }
.status-pill, .reader-status-pill {
  display: inline-flex; align-items: center; min-height: 36px; width: fit-content;
  padding: 7px 13px; border-radius: 999px; font-weight: 800; border: 1px solid transparent;
}
.status-pill.New, .reader-status-pill.New { background: #eef3f7; color: #58708a; }
.status-pill.Learning, .reader-status-pill.Learning { background: #fff2cf; color: #8a6b11; }
.status-pill.Mastered, .reader-status-pill.Mastered { background: #e3f2e5; color: #43764a; }
.status-pill.Weak, .reader-status-pill.Weak { background: #fbe6e6; color: #9e5555; }
.card-actions { margin-top: auto; }
.primary-btn {
  width: 100%; min-height: 44px; border-radius: 999px; border: 1px solid transparent;
  background: linear-gradient(135deg, var(--green), var(--blue)); color: #fff; font-weight: 800;
}

.drawer-backdrop {
  position: fixed; inset: 0; background: rgba(28, 36, 44, .32); backdrop-filter: blur(3px); z-index: 50;
}
.menu-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(420px, 100%); z-index: 60;
  border-radius: 0; padding: 16px; overflow: auto;
}
.drawer-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
.drawer-head h2 { margin: 0; font-size: 1.6rem; }
.drawer-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.drawer-tab {
  min-height: 44px; border-radius: 14px; border: 1px solid var(--line); background: #fff; color: var(--ink); font-weight: 800;
}
.drawer-tab.active { background: linear-gradient(135deg, var(--green), var(--blue)); color: #fff; border-color: transparent; }
.drawer-section { display: grid; gap: 14px; }
.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quick-btn {
  min-height: 44px; border-radius: 14px; border: 1px solid var(--line); background: #fff; color: var(--ink); font-weight: 700;
}
.menu-block {
  background: rgba(255,255,255,.72); border: 1px solid var(--line); border-radius: 20px; padding: 14px;
}
.menu-block h3 { margin-bottom: 6px; font-size: 1.1rem; }
.menu-help { color: var(--muted); font-size: .94rem; line-height: 1.45; margin-bottom: 12px; }
.menu-mode-list { display: grid; gap: 10px; }
.menu-mode-btn {
  border: 1px solid var(--line); background: #fff; border-radius: 18px; padding: 14px; text-align: left;
  display: grid; gap: 4px; color: var(--ink);
}
.menu-mode-btn strong { font-size: 1rem; }
.menu-mode-btn span { color: var(--muted); line-height: 1.35; }
.menu-mode-btn.active { background: linear-gradient(135deg, var(--green), var(--blue)); border-color: transparent; }
.menu-mode-btn.active strong, .menu-mode-btn.active span { color: #fff; }
.az-filter { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
.letter-btn {
  min-height: 50px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--ink); font-weight: 800;
}
.letter-btn.active { background: linear-gradient(135deg, var(--green), #7ca797); color: #fff; border-color: transparent; }
.stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.stat-button {
  border: 1px solid var(--line); border-radius: 18px; padding: 14px; text-align: left; background: #fff; box-shadow: var(--shadow-soft);
}
.stat-button strong { display: block; font-size: 1.35rem; margin-top: 6px; color: #243544; }
.stat-button span { color: var(--muted); }
.stat-button.clickable { cursor: pointer; }
.stat-button.new { background: #f7f8fa; }
.stat-button.learning { background: var(--gold-soft); }
.stat-button.mastered { background: #e6f2e8; }
.stat-button.weak { background: var(--red-soft); }

.reader-overlay {
  position: fixed; inset: 0; z-index: 80; padding: 10px; background: rgba(245, 242, 236, .96); backdrop-filter: blur(4px);
}
.reader-shell {
  width: min(1000px, 100%); height: 100%; margin: 0 auto; padding: 12px; display: grid;
  grid-template-rows: auto auto 1fr auto; gap: 10px; border-radius: 24px;
}
.reader-topbar {
  display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center;
}
.reader-close, .reader-nav-btn, .small-btn {
  min-height: 42px; border-radius: 14px; border: 1px solid var(--line); background: #fff; color: var(--ink); font-weight: 800;
}
.reader-close { padding: 0 14px; }
.reader-nav-top { display: flex; gap: 8px; }
.reader-nav-btn { width: 42px; padding: 0; }
.reader-title-wrap h2 {
  margin: 0 0 8px; font-size: clamp(2rem, 5vw, 3.6rem); line-height: 1.03; letter-spacing: -.01em; color: #243544; font-weight: 900;
}
.reader-meta { display: flex; flex-wrap: wrap; gap: 8px; }
.meaning-chip {
  display: inline-flex; align-items: center; min-height: 38px; padding: 7px 12px; border-radius: 999px;
  background: #fff; border: 1px solid var(--line); line-height: 1.4;
}
.reader-position { color: var(--muted); font-size: .95rem; padding: 0 2px; }
.image-stage {
  border: 1px solid var(--line); border-radius: 20px; background: rgba(255,255,255,.76);
  display: flex; justify-content: center; align-items: flex-start; overflow: auto; padding: 10px;
}
.image-stage img { max-width: 100%; height: auto; display: block; border-radius: 16px; box-shadow: var(--shadow-soft); }
.image-stage.actual img { max-width: none; }
.reader-controls { display: grid; gap: 10px; }
.compact-controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.small-btn { padding: 0 14px; }
.status-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.status-btn {
  min-height: 42px; border-radius: 999px; border: 1px solid transparent; padding: 0 14px; font-weight: 800;
}
.status-btn.New { background: #eef3f7; color: #58708a; }
.status-btn.Learning { background: #fff2cf; color: #8a6b11; }
.status-btn.Mastered { background: #e3f2e5; color: #43764a; }
.status-btn.Weak { background: #fbe6e6; color: #9e5555; }
.status-btn.active { box-shadow: inset 0 0 0 2px rgba(38,50,56,.08); }

@media (max-width: 760px) {
  .page-shell { width: min(100%, calc(100% - 14px)); padding-top: 12px; }
  .card-grid { grid-template-columns: 1fr; gap: 12px; }
  .menu-drawer { width: 100%; }
  .quick-actions, .stats-grid { grid-template-columns: 1fr 1fr; }
  .az-filter { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  .reader-shell { padding: 10px; }
  .reader-topbar { grid-template-columns: auto 1fr; }
  .reader-nav-top { grid-column: 1 / -1; justify-content: flex-end; }
  .reader-meta { display: grid; }
  .meaning-chip { border-radius: 14px; }
  .status-row { gap: 6px; }
  .status-btn { flex: 1 1 calc(50% - 6px); }
}
@media (max-width: 480px) {
  .topbar h1 { font-size: 1.8rem; }
  .menu-btn, .drawer-close { width: 44px; height: 44px; }
  .search-panel { padding: 12px; }
  .word-card { padding: 14px; }
  .word-card h3 { font-size: 1.72rem; }
  .az-filter { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .quick-actions, .stats-grid { grid-template-columns: 1fr; }
  .reader-overlay { padding: 6px; }
  .reader-title-wrap h2 { font-size: 2.45rem; }
  .reader-close, .reader-nav-btn, .small-btn { min-height: 40px; }
}


/* Premium search polish + remove duplicate browser search cross */
.search-wrap input[type="search"] {
  -webkit-appearance: none;
  appearance: none;
}
.search-wrap input[type="search"]::-webkit-search-decoration,
.search-wrap input[type="search"]::-webkit-search-cancel-button,
.search-wrap input[type="search"]::-webkit-search-results-button,
.search-wrap input[type="search"]::-webkit-search-results-decoration {
  -webkit-appearance: none;
  appearance: none;
  display: none;
}
.search-wrap input::-ms-clear,
.search-wrap input::-ms-reveal {
  display: none;
  width: 0;
  height: 0;
}

/* More premium, calmer interface */
body {
  background:
    radial-gradient(circle at 12% 0%, rgba(95, 141, 126, .16), transparent 22rem),
    radial-gradient(circle at 96% 4%, rgba(107, 142, 174, .16), transparent 24rem),
    linear-gradient(180deg, #fcfaf5 0%, #f7f4ee 54%, #f2ece3 100%);
}

.topbar {
  padding: 4px 2px 6px;
}

.topbar h1 {
  text-shadow: 0 10px 28px rgba(38, 50, 56, .08);
}

.menu-btn {
  background: linear-gradient(135deg, #ffffff, #edf3f5);
  border-color: rgba(95, 141, 126, .18);
  box-shadow: 0 16px 36px rgba(38, 50, 56, .10);
}

.search-panel {
  background:
    linear-gradient(135deg, rgba(255, 253, 248, .96), rgba(255, 251, 244, .88));
  border-color: rgba(229, 225, 216, .98);
  box-shadow: 0 20px 46px rgba(38, 50, 56, .09);
}

.search-wrap input {
  border-color: rgba(107, 142, 174, .28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.92),
    0 10px 24px rgba(38, 50, 56, .04);
}

.search-wrap input:focus {
  border-color: rgba(95, 141, 126, .56);
  box-shadow:
    0 0 0 4px rgba(95, 141, 126, .12),
    inset 0 1px 0 rgba(255,255,255,.92);
  outline: none;
}

.search-clear {
  background: linear-gradient(135deg, #f7fbfb, #eef4f3);
  border-color: rgba(95, 141, 126, .18);
  color: #517065;
  font-weight: 900;
}

.word-card {
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,251,244,.92));
  border-color: rgba(229, 225, 216, .95);
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}

.word-card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, rgba(95,141,126,.55), rgba(107,142,174,.42), rgba(217,164,65,.26));
}

.word-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 38px rgba(38, 50, 56, .10);
  border-color: rgba(95, 141, 126, .24);
}

.primary-btn {
  box-shadow: 0 12px 24px rgba(95, 141, 126, .18);
}

.primary-btn:hover {
  filter: saturate(1.04);
  transform: translateY(-1px);
}

.menu-drawer {
  background:
    linear-gradient(180deg, rgba(255,253,248,.98), rgba(250,246,239,.96));
  box-shadow: -22px 0 54px rgba(38, 50, 56, .16);
}

.drawer-tab,
.quick-btn,
.menu-mode-btn,
.letter-btn,
.stat-button {
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

.drawer-tab:hover,
.quick-btn:hover,
.menu-mode-btn:hover,
.letter-btn:hover,
.stat-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(38, 50, 56, .08);
}

.menu-block {
  background:
    linear-gradient(145deg, rgba(255,255,255,.88), rgba(255,251,244,.76));
  box-shadow: 0 8px 20px rgba(38, 50, 56, .045);
}

.reader-shell {
  background:
    linear-gradient(180deg, rgba(255,253,248,.98), rgba(250,246,239,.96));
}

.reader-title-wrap h2 {
  color: #243544;
  text-shadow: 0 8px 22px rgba(38, 50, 56, .07);
}

.meaning-chip {
  background: linear-gradient(135deg, #ffffff, #fbf7ee);
  border-color: rgba(229, 225, 216, .95);
}

/* Default fit mode should show the whole flashcard without internal scrolling */
.image-stage {
  overflow: hidden;
  align-items: center;
}

.image-stage img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.image-stage.actual {
  overflow: auto;
  align-items: flex-start;
}

.image-stage.actual img {
  max-height: none;
}

/* Mobile: reduce visual crowding */
@media (max-width: 760px) {
  .topbar {
    align-items: center;
    margin-bottom: 10px;
  }

  .topbar h1 {
    font-size: clamp(1.7rem, 8vw, 2.35rem);
  }

  .search-panel {
    padding: 10px;
    border-radius: 22px;
  }

  .search-wrap input {
    min-height: 50px;
    border-radius: 16px;
    font-size: .98rem;
  }

  .result-note {
    font-size: .9rem;
    margin-left: 2px;
  }

  .word-card {
    border-radius: 22px;
  }

  .menu-drawer {
    padding: 14px;
  }

  .reader-shell {
    grid-template-rows: auto auto minmax(0, 1fr) auto;
    gap: 8px;
  }

  .reader-topbar {
    position: sticky;
    top: 0;
    z-index: 2;
    background: rgba(255,253,248,.96);
    border: 1px solid rgba(229,225,216,.88);
    border-radius: 18px;
    padding: 8px;
    backdrop-filter: blur(10px);
  }
}


/* GitHub-safe final polish */
.reader-nav-top {
  min-width: 96px;
  justify-content: flex-end;
}

.reader-topbar {
  min-height: 118px;
}

.reader-title-wrap {
  min-width: 0;
}

.reader-title-wrap h2 {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.reader-close {
  background: linear-gradient(135deg, #f5efe3, #eadfcd);
  border-color: rgba(95, 141, 126, .18);
  box-shadow: 0 10px 22px rgba(38,50,56,.08);
}

.reader-nav-btn {
  background: linear-gradient(135deg, #ffffff, #eef5f3);
  border-color: rgba(95, 141, 126, .20);
  box-shadow: 0 10px 22px rgba(38,50,56,.08);
}

.reader-meta {
  min-height: 42px;
}

.reader-status-pill {
  font-weight: 900;
}

.image-stage {
  min-height: 0;
  height: 100%;
}

.reader-shell {
  overflow: hidden;
}

@media (max-width: 760px) {
  .reader-topbar {
    min-height: auto;
  }
  .reader-title-wrap h2 {
    font-size: clamp(1.65rem, 8vw, 2.4rem);
    white-space: normal;
    line-height: 1.05;
  }
  .reader-nav-top {
    min-width: 94px;
  }
  .image-stage {
    padding: 8px;
  }
}

@media (max-width: 480px) {
  .reader-title-wrap h2 {
    font-size: clamp(1.55rem, 9vw, 2.15rem);
  }
  .meaning-chip {
    font-size: .92rem;
  }
}

/* Make sure hidden remains hidden even if browser default styles conflict */
[hidden],
.hidden {
  display: none !important;
}


/* Reader 85% image-space fix: the flashcard image is the main area, controls are not fixed */
.reader-overlay {
  overflow: auto;
  padding: 10px;
}

.reader-shell {
  height: auto;
  min-height: calc(100dvh - 20px);
  overflow: visible;
  display: grid;
  grid-template-rows: auto auto minmax(68dvh, 85dvh) auto;
  gap: 10px;
}

.reader-topbar {
  min-height: auto;
  align-items: start;
  background:
    linear-gradient(135deg, rgba(255,255,255,.92), rgba(250,246,238,.86));
  border: 1px solid rgba(229,225,216,.95);
  border-radius: 22px;
  padding: 12px;
  box-shadow: 0 10px 24px rgba(38,50,56,.06);
}

.reader-close {
  min-width: 96px;
  justify-content: center;
}

.reader-title-wrap h2 {
  margin-bottom: 8px;
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
  letter-spacing: -.015em;
}

.reader-meta {
  min-height: auto;
  display: flex;

  flex-wrap: wrap;

}

.reader-nav-top {
  min-width: 104px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  align-self: start;
}

.reader-nav-btn {
  width: 48px;
  height: 48px;
  min-height: 48px;
  border-radius: 16px;
  background: linear-gradient(135deg, #ffffff, #eef6f3);
  border-color: rgba(95, 141, 126, .22);
}

.reader-position {
  padding: 0 6px;
  margin: 0;
}

.image-stage {
  height: 85dvh;
  min-height: 68dvh;
  max-height: 85dvh;
  overflow: hidden;
  align-items: center;
  justify-content: center;
  padding: 12px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.84), rgba(251,247,240,.76));
}

.image-stage img {
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 100%;

}

.image-stage.actual {
  height: 85dvh;

  min-width: 64px;
  background: linear-gradient(135deg, #ffffff, #f3f6f5);
  border-color: rgba(95,141,126,.16);

}

.status-row .status-btn {

/* Keep the image readable and the reader stable on mobile */
@media (max-width: 760px) {

  border-width: 1px;
  font-weight: 950;
  letter-spacing: -.01em;
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
}

.reader-close {
  min-height: 50px;
  padding: 0 20px;
  border-radius: 18px;
  background: linear-gradient(135deg, #fff9ee, #eee4d3);
  color: #243544;
  border: 1px solid rgba(197,181,154,.48);
  box-shadow:
    0 14px 30px rgba(38,50,56,.09),
    inset 0 1px 0 rgba(255,255,255,.85);
}

.reader-nav-top {
  display: flex;
  gap: 12px;
  min-width: 330px;
  justify-content: flex-end;
}

.reader-word-nav {
  width: auto !important;
  min-width: 152px;
  min-height: 50px;
  padding: 0 17px !important;
  border-radius: 18px;
  white-space: nowrap;
  background: linear-gradient(135deg, #ffffff, #edf7f4);
  color: #243544;
  border: 1px solid rgba(95,141,126,.25);
  box-shadow:
    0 14px 30px rgba(38,50,56,.08),
    inset 0 1px 0 rgba(255,255,255,.86);
}

.reader-close:hover,
.reader-word-nav:hover,
.reader-bottom-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 20px 40px rgba(38,50,56,.14),
    inset 0 1px 0 rgba(255,255,255,.9);
  filter: saturate(1.05);
}

/* Premium status buttons with selected state */
.status-row-top,
.status-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.status-row-top .status-btn,
.status-row .status-btn {
  position: relative;
  isolation: isolate;
  cursor: pointer;
  min-width: 124px;
  min-height: 42px;
  padding: 0 18px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-weight: 950;
  letter-spacing: -.01em;
  box-shadow:
    0 10px 20px rgba(38,50,56,.055),
    inset 0 1px 0 rgba(255,255,255,.72);
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease, border-color .16s ease;
}

.status-row-top .status-btn:hover,
.status-row .status-btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 18px 34px rgba(38,50,56,.14),
    inset 0 1px 0 rgba(255,255,255,.8);
  filter: saturate(1.08);
}

.status-row-top .status-btn.active,
.status-row .status-btn.active {
  transform: translateY(-2px) scale(1.025);
  border-color: rgba(36,53,68,.18);
  box-shadow:
    0 20px 42px rgba(38,50,56,.16),
    0 0 0 4px rgba(255,255,255,.88),
    inset 0 0 0 2px rgba(255,255,255,.48);
}

.status-row-top .status-btn.active::after,
.status-row .status-btn.active::after {
  content: "✓";
  display: inline-grid;
  place-items: center;
  width: 24px;
  height: 24px;
  margin-left: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.72);
  color: currentColor;
  font-size: .88rem;
  font-weight: 1000;
  box-shadow: inset 0 0 0 1px rgba(38,50,56,.08);
}

.status-row-top .status-btn.New.active,
.status-row .status-btn.New.active {
  background: linear-gradient(135deg, #edf5fb, #d9e8f3);
  color: #3f6284;
}

.status-row-top .status-btn.Learning.active,
.status-row .status-btn.Learning.active {
  background: linear-gradient(135deg, #fff0b8, #f6d979);
  color: #735706;
}

.status-row-top .status-btn.Mastered.active,
.status-row .status-btn.Mastered.active {
  background: linear-gradient(135deg, #dff1e2, #bfe3c6);
  color: #2f6b3f;
}

.status-row-top .status-btn.Weak.active,
.status-row .status-btn.Weak.active {
  background: linear-gradient(135deg, #f8dddd, #efbfc2);
  color: #914a4f;
}

.reader-position {
  position: static !important;
  padding: 10px 22px;
  margin: 0;
  color: #64748b;
  background: rgba(255,253,248,.92);
  border-bottom: 1px solid rgba(229,225,216,.88);
  font-size: 1rem;
}

/* Image is full readable width; page scrolls as one normal page */
.image-stage {
  display: block;
  width: 100%;
  height: auto !important;
  min-height: 0 !important;
  max-height: none !important;
  padding: 0;
  margin: 0;
  border: 0;
  border-radius: 0;
  background: #f7f4ee;
  box-shadow: none;
  overflow: visible !important;
  text-align: center;
}

.image-stage img {
  display: block;
  width: 100vw !important;
  max-width: 100vw !important;
  height: auto !important;
  max-height: none !important;
  margin: 0 auto;
  padding: 0;
  border-radius: 0;
  box-shadow: none;
  object-fit: contain;
}

.image-stage::after {
  display: none !important;
  content: none !important;
}

/* Remove zoom controls completely */
.reader-controls,
.compact-controls,
.small-btn {
  display: none !important;
}

/* Bottom reader navigation */
.reader-bottom-nav {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 16px 14px 22px;
  background: #f7f4ee;
  border-top: 1px solid rgba(229,225,216,.88);
}

.reader-bottom-btn {
  min-height: 46px;
  padding: 0 18px;
  border-radius: 999px;
  border: 1px solid rgba(95,141,126,.20);
  background: linear-gradient(135deg, #ffffff, #eef7f4);
  color: #243544;
  font-weight: 950;
  box-shadow: 0 10px 22px rgba(38,50,56,.07);
}

.back-bottom-btn {
  background: linear-gradient(135deg, #fffaf0, #eee3d2);
}

/* Floating go-to-top button */
.scroll-top-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 120;
  width: 46px;
  height: 46px;
  border-radius: 999px;
  border: 1px solid rgba(95,141,126,.22);
  background: linear-gradient(135deg, #ffffff, #eaf4f0);
  color: #466e61;
  font-weight: 950;
  font-size: 1.25rem;
  box-shadow: 0 14px 30px rgba(38,50,56,.14);
  transition: transform .16s ease, box-shadow .16s ease;
}

.scroll-top-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 36px rgba(38,50,56,.16);
}

.scroll-top-btn.hidden {
  display: none !important;
}

/* Mobile */
@media (max-width: 760px) {
  .topbar {
    width: min(100%, calc(100% - 18px));

  }
